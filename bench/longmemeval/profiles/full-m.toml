schema_version = 1
benchmark = "longmemeval"
protocol_version = "2026-03-31-longmemeval-contract-v1"
ingest_format = "round"
consolidation = "end"

[dataset]
identifier = "longmemeval-m"
expected_fingerprint = "3a139c871d6df891"

[runtime.llm]
provider = "openai"
retain_model = "anthropic/claude-sonnet-4.6"
reflect_model = "anthropic/claude-sonnet-4.6"

[runtime.embedding]
provider = "local"
model = "bge-small-en-v1.5"

[runtime.reranker]
provider = "local"
model = "ms-marco-MiniLM-L-6-v2"

[runtime.tuning]
reflect_budget_tokens = 4096
dedup_threshold = 0.95
retain_chunk_max_tokens = 2048
retain_chunk_overlap_tokens = 64

[runtime.tuning.extraction]
structured_output_max_attempts = 3

[runtime.tuning.graph]
semantic_threshold = 0.7
temporal_max_days = 30
enable_causal = true

[runtime.tuning.consolidation]
batch_size = 8
max_tokens = 4096
recall_budget = 512
structured_output_max_attempts = 3

[runtime.tuning.reflect]
max_iterations = 8
source_limit = 3
enable_source_lookup = true

[runtime.tuning.retrieval]
retriever_limit = 40
max_facts = 50

[judge]
provider = "openai"
model = "anthropic/claude-sonnet-4.6"
max_tokens = 200
max_attempts = 3
