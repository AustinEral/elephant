services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: elephant
      POSTGRES_USER: elephant
      POSTGRES_PASSWORD: elephant
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elephant"]
      interval: 2s
      retries: 10

  elephant:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgres://elephant:elephant@postgres/elephant
      # Override host-specific paths with container paths.
      ORT_DYLIB_PATH: /usr/local/lib/libonnxruntime.so
      EMBEDDING_MODEL_PATH: /app/models/bge-small-en-v1.5
      RERANKER_MODEL_PATH: /app/models/ms-marco-MiniLM-L-6-v2

volumes:
  pgdata:
